<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVault — Document Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header" role="banner">
            <div class="search-wrapper" role="search">
                <span class="search-icon" aria-hidden="true">🔍</span>
                <input
                type="text"
                id="searchInput"
                class="search-input"
                placeholder="Search documents by title or description..."
                aria-label="Search documents"
                autocomplete="off"
                >
                <button
                id="clearSearch"
                class="clear-search-btn"
                aria-label="Clear search"
                title="Clear search"
                type="button"
                >
                ✕
            </button>
        </div>
        <p class="doc-count" id="docCount" aria-live="polite">Loading documents…</p>
    </div>
</header>

<main class="site-main" role="main">
    <nav class="category-filters" id="categoryFilters" aria-label="Filter by category">
    </nav>

    <section class="document-grid" id="documentGrid" aria-label="Document list">
        <div class="loading-state" id="loadingState">
            <div class="loading-spinner" aria-hidden="true"></div>
            <p>Loading documents…</p>
        </div>
    </section>

    <div class="empty-state" id="emptyState" style="display: none;" role="status">
        <span class="empty-icon" aria-hidden="true">📭</span>
        <h2>No documents found</h2>
        <p>Try adjusting your search terms or clearing the filters.</p>
        <button class="btn-reset" id="btnResetFilters" type="button">Reset All Filters</button>
    </div>
</main>

<footer class="site-footer" role="contentinfo">
    <p>
        <strong>StudyVault</strong> — Static Document Library &nbsp;|&nbsp;
        Hosted on <a href="https://pages.github.com" target="_blank" rel="noopener noreferrer">GitHub Pages</a>
        &nbsp;|&nbsp; Add files to <code>/docs</code> &amp; update <code>documents.json</code>
    </p>
</footer>
<script src="script.js"></script>
</body>
</html>
